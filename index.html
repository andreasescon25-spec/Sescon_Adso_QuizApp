<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz App</title>
  <link rel="stylesheet" href="QuizApp.css">
</head>
<body>

  <div class="container">

    <!-- START SCREEN -->
    <div id="start-screen">
      <h1>Quiz App</h1>

      <input
        type="text"
        id="player-name"
        placeholder="Enter your name"
      >

      <h3>Select a Category</h3>

      <button class="category-btn" data-category="Science">
        Science
      </button>

      <button class="category-btn" data-category="History">
        History
      </button>

      <button class="category-btn" data-category="Technology">
        Technology
      </button>
    </div>


    <!-- QUIZ SCREEN -->
    <div id="quiz-screen" class="hidden">

      <h2 id="question-text"></h2>

      <div id="choices-container"></div>

      <p id="feedback"></p>

    </div>


    <!-- RESULT SCREEN -->
    <div id="result-screen" class="hidden">

      <h2>Quiz Results</h2>

      <p id="final-score"></p>

      <div id="answer-breakdown"></div>

      <button id="play-again">
        Play Again
      </button>

    </div>

  </div>

  <script src="QuizApp.js"></script>

</body>
</html>
